          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    nullable: true
              example: |
                {
                  "success": false,
                  "code": 404,
                  "message": "Data tidak ditemukan",
                  "data": null
                }

  /api/v1/layanan/lembar-kerja/{lk_id}:
    get:
      tags:
        - Layanan
      summary: Detail Lembar Kerja
