  /api/v1/layanan/ajuan/{ajuan_id}:
    get:
      tags:
        - Layanan
      summary: Detail Ajuan
      description: Mendapatkan detail ajuan
      parameters:
        - name: ajuan_id
          required: true
          in: path
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                      no_regis:
                        type: string
                      nama:
                        type: string
                      nik:
                        type: string
                      jenis_layanan:
                        type: string
                      kecamatan:
                        type: string
                      tanggal_ajuan:
                        type: string
                      timeline:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            status:
                              type: string
                            note:
                              type: string
                            tanggal:
                              type: string
                            waktu:
                              type: string
                  status:
                    type: boolean
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mengambil detail ajuan",
                  "data": {
                    "id": 1,
                    "no_regis": "REG-777",
                    "nama": "Zangen Shiro",
                    "nik": "7777774707007070",
                    "jenis_layanan": "umum",
                    "kecamatan": "Septentrionalis",
                    "tanggal_ajuan": "2026-05-27, 12:03",
                    "timeline": [
                      {
                        "id": 1,
                        "status": "Diajukan",
                        "note": "Ajuan masuk",
                        "tanggal": "2026-05-27",
                        "waktu": "12:03"
                      },
                      {
                        "id": 2,
                        "status": "Diverifikasi",
                        "note": "Telah Diverifikasi Oleh Admin",
