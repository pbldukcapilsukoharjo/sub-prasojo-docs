openapi: 3.0.3
info:
  title: Sub-Prasojo API
  version: 1.5.0
  description: API Design untuk Dashboard Kinerja dan TAMAT
servers:
  - url: "http://localhost:8000"
    description: Local Server
  - url: "https://6ifb537y9e5l.mock.hoppscotch.io"
    description: Mock Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO

    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token

security:
  - bearerAuth: []

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register
      description: Mendaftarkan user baru ke dalam sistem.
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "fullname": "Zangen Shiro",
                "email": "shiro@gmail.com",
                "password": "shiro123"
              }
      responses:
        "201":
          description: Created
          content:
            application/json:
              example: |
                {
                  "code": 201,
                  "message": "Registrasi berhasil",
                  "data": {
                    "fullname": "Zangen Shiro",
                    "email": "shiro@gmail.com",
                    "updated_at": "2026-05-27 12:00:00",
                    "created_at": "2026-05-27 12:00:00",
                    "deleted_at": null
                  }
                }
        "400":
          description: Bad Request
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Registrasi gagal",
                  "error": "Ini Error"
                }

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Login user ke dalam sistem.
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "shiro@gmail.com",
                "password": "shiro123"
              }
      responses:
        "200":
          description: Success
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
                example: refresh_token=xxxxxxx; HttpOnly; Secure
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Login berhasil",
                  "data": {
                    "access_token": "v2.xxxxxxx"
                  }
                }
        "400":
          description: Bad Request
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Login gagal",
                  "error": "Ini Error"
                }

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: Logout dari aplikasi
      security:
        - bearerAuth: []
          refreshTokenCookie: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Logout berhasil"
                }
        "400":
          description: Bad Request
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Logout gagal",
                  "error": "Ini Error"
                }

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Token
      description: Mendapatkan access token baru
      security:
        - bearerAuth: []
          refreshTokenCookie: []
      responses:
        "200":
          description: Success
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
                example: refresh_token=xxxxxxx; HttpOnly; Secure
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Refresh berhasil",
                  "data": {
                    "access_token": "v2.xxxxxxx"
                  }
                }
        "400":
          description: Bad Request
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Refresh gagal",
                  "error": "Ini Error"
                }

  /api/v1/auth/email/verify:
    get:
      tags:
        - Email
      summary: Notifikasi
      description: Middleware untuk notifikasi verifikasi email yang belum terverifikasi
      security: []
      responses:
        "403":
          description: Forbidden
          content:
            application/json:
              example: |
                {
                  "code": 403,
                  "message": "Email belum diverifikasi. Silakan periksa email Anda."
                }

  /api/v1/auth/email/verify/{id}/{hash}:
    get:
      tags:
        - Email
      summary: Verifikasi
      description: Verifikasi email berdasarkan id dan hash
      security: []
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: hash
          required: true
          in: path
          schema:
            type: string
      responses:
        "302":
          description: | 
              Redirect ke halaman setelah verifikasi

              Contoh:
              - Success: https://frontend.app/verify-success
              - Failure: https://frontend.app/verify-failure?message=error
          headers:
            Location:
              schema:
                type: string
                format: uri

  /api/v1/auth/email/resend:
    post:
      tags:
        - Email
      summary: Kirim Ulang
      description: Mengirim ulang email verifikasi ke alamat email yang terdaftar
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "shiro@gmail.com"
              }
      responses:
        "200":
          description: Email verifikasi berhasil dikirim ulang
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Email verifikasi telah dikirim ulang."
                }
        "400":
          description: Email tidak valid atau tidak terdaftar
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Error"
                }

  /api/v1/auth/forgot-password:
    post:
      tags:
        - Password
      summary: Forgot Password
      description: Mengirimkan email untuk mengubah password
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "shiro@gmail.com"
              }
      responses:
        "200":
          description: Email berhasil dikirim
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Email berhasil dikirim."
                }
        "400":
          description: Email tidak valid atau tidak terdaftar
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Error"
                }

  /api/v1/auth/reset-password:
    post:
      tags:
        - Password
      summary: Reset Password
      description: Mengubah password berdasarkan token yang diterima
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "shiro@gmail.com",
                "token": "1234567",
                "password": "ShiroKawaii123",
                "password_confirmation": "ShiroKawaii123"
              }
      responses:
        "200":
          description: Password berhasil diubah
          content:
            application/json:
              example: |
                {
                  "code": 200,
                  "message": "Password berhasil diubah."
                }
        "400":
          description: Token tidak valid
          content:
            application/json:
              example: |
                {
                  "code": 400,
                  "message": "Error"
                }

  /api/v1/me:
    get:
      tags:
        - User
      summary: Me
      description: Mendapatkan data pengguna yang sedang login
      responses:
        "200":
