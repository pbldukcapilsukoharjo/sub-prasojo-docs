openapi: 3.0.3
info:
  title: Sub-Prasojo API
  version: 1.0.0
  description: API Design untuk Dashboard Kinerja dan TAMAT 
  servers:
  - url: 'http://localhost:8000'
    description: Local Server
  - url: 'https://6ifb537y9e5l.mock.hoppscotch.io'
    description: Mock Server
paths:
  /api/v1/kinerja/operator:
    get:
      tags:
        - Kinerja Operator
      summary: Ranking
      description: Mendapatkan ranking kinerja operator berdasarkan jumlah layanan yang diproses dalam rentang waktu tertentu. Data dapat difilter dengan tanggal awal, tanggal akhir, dan pagination.
      parameters:
        - name: tanggal_awal
          in: query
          schema:
            type: string
        - name: tanggal_akhir
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: string
            default: "1"
      responses:
        '200':
          description: Success
          content:
            application/json:
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan data kinerja operator",
                  "data": [
                    {
                      "rank": 1,
                      "operator_id": 3,
