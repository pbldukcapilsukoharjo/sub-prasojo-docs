  /api/v1/layanan:
    get:
      tags:
        - Layanan
      summary: List Layanan
      description: Dapatkan semua data layanan atau layanan tertentu berdasarkan filter
      parameters:
        - name: serviceType
          required: true
          description: Tipe layanan yang ingin diambil
          in: query
          schema:
            type: string
            default: "all"
        - name: page
          required: true
          in: query
          schema:
            type: integer
            default: 1
        - name: search
          description: Pencarian cepat
          in: query
          schema:
            type: string
        - name: district
          description: Kecamatan yang ingin diambil
          in: query
          schema:
            type: string
        - name: period
          description: Periode yang ingin diambil
          in: query
          schema:
            type: string
        - name: sortBy
          description: Urutan hasil pencarian
          required: true
          in: query
          schema:
            type: string
            default: "newest"
        - name: startDate
          description: Tanggal awal pencarian
          in: query
          schema:
            type: string
        - name: endDate
          description: Tanggal akhir pencarian
          in: query
          schema:
            type: string
        - name: reporter
          description: Nama asal layanan
          in: query
          schema:
            type: string
        - name: status
          description: Status yang ingin diambil
          in: query
          schema:
            type: string
        - name: identityName
          description: Nama identitas yang ingin diambil
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    nullable: true
                    properties:
                      grafik_ajuan:
                        type: object
                        nullable: true
                        properties:
                          persentase_distribusi_status:
                            type: array
                            items:
                              type: object
                              properties:
                                label:
                                  type: string
                                persentase:
                                  type: integer
                          jumlah_per_jenis_layanan:
                            type: array
                            items:
                              type: object
                              properties:
                                label:
                                  type: string
                                jumlah:
                                  type: integer
                      layanan:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              type: object
                              properties:
                                tipe:
                                  type: string
                                no_regis:
                                  type: string
                                kode_ajuan:
                                  type: string
                                kecamatan:
                                  type: string
                                tanggal:
                                  type: string
                                waktu:
                                  type: string
                                status:
                                  type: string
                                jalur:
                                  type: string
                                  nullable: true
                                pelapor:
                                  type: string
                                  nullable: true
                                kode_produk:
                                  type: string
                                  nullable: true
                                jenis_ajuan:
                                  type: string
                                  nullable: true
                                no_kk:
                                  type: string
                                  nullable: true
                                nama_identitas_produk:
                                  type: string
                                  nullable: true
                          meta:
                            type: object
                            properties:
                              page:
                                type: integer
                              per_page:
                                type: integer
                              total:
                                type: integer
                              total_page:
                                type: integer
              example: |
                {
                  "success": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan layanan",
                  "data": {
                    "grafik_ajuan": {
                      "persentase_distribusi_status": [
                        {
                          "label": "DIVERIFIKASI",
                          "persentase": 20
                        },
                        {
                          "label": "DISETUJUI",
                          "persentase": 30
                        },
                        {
                          "label": "DITOLAK",
                          "persentase": 10
                        },
                        {
