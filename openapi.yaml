  /api/v1/kinerja/operator/{operator_id}:
    get:
      tags:
        - Kinerja Operator
      summary: Detail Operator
      description: Mendapatkan detail kinerja operator tertentu, termasuk total layanan yang diproses, rincian per jenis layanan, dan jumlah layanan per hari.
      parameters:
        - name: operator_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan detail operator",
                  "data": {
                    "operator_id": 3,
                    "fullname": "Agus Wibowo",
                    "total_layanan": 45,
                    "per_hari": [
                      { "tanggal": "2026-03-31", "jumlah": 8 }
                    ],
                    "per_jenis": [
                      { "layanan_kode": "AKL", "jumlah": 18 }
                    ]
                  }
                }

  /api/v1/dashboard/summary:
    get:
      tags:
        - Dashboard
      summary: Dashboard Utama
      description: Mendapatkan ringkasan data kinerja sistem.
      parameters:
        - name: tanggal_awal
          in: query
          schema:
            type: string
        - name: tanggal_akhir
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan data terbaru",
                  "data": {
                    "total_ajuan": 320,
                    "belum_diverifikasi": 45,
                    "proses_verifikasi": 12,
                    "disetujui": 180,
                    "ditolak": 23,
                    "selesai": 60,
                    "total_tamat": 87,
                    "layanan_terpopuler": "AKM"
                  }
                }

  /api/v1/dashboard/statistik:
    get:
      tags:
        - Dashboard
      summary: Statistik Layanan
      description: Mendapatkan statistik jumlah layanan berdasarkan jenis layanan.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan statistik layanan",
                  "data": [
                    { "layanan_kode": "AKL", "layanan_nama": "Akta Kelahiran", "jumlah": 120 },
                    { "layanan_kode": "KK",  "layanan_nama": "Kartu Keluarga", "jumlah": 98 },
                    { "layanan_kode": "AKM", "layanan_nama": "Akta Kematian", "jumlah": 14 }
                  ]
