openapi: 3.0.3
info:
  title: Sub-Prasojo API
  version: 2.1.2
  description: API Design untuk Dashboard Kinerja dan TAMAT
servers:
  - url: http://localhost:8000
    description: Local Server
  - url: https://6ifb537y9e5l.mock.hoppscotch.io
    description: Mock Server
  - url: https://api.arenakita.my.id
    description: Prodi Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
security:
  - bearerAuth: []
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register
      description: Mendaftarkan user baru ke dalam sistem.
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "fullname": "Zangen Shiro",
                "email": "shiro@gmail.com",
                "password": "shiro123"
              }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      fullname:
                        type: string
                      email:
                        type: string
                      updated_at:
                        type: string
                      created_at:
                        type: string
                      deleted_at:
                        type: string
                  status:
                    type: boolean
              example: |
                {
                  "status": true,
                  "code": 201,
                  "message": "Registrasi berhasil",
                  "data": {
                    "fullname": "Zangen Shiro",
                    "email": "shiro@gmail.com",
                    "updated_at": "2026-05-27 12:00:00",
                    "created_at": "2026-05-27 12:00:00",
                    "deleted_at": null
                  }
                }
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  error:
                    type: string
                  status:
                    type: boolean
              example: |
                {
                  "status": false,
                  "code": 400,
                  "message": "Validasi gagal. Silakan periksa kembali input Anda.",
                  "data": {
                    "nama_parameter": ["Pesan error spesifik dari backend (bahasa indonesia)"]
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  code:
                    type: integer
                  message:
                    type: string
                  data: null
              example: |
                {
                  "status": false,
                  "code": 401,
                  "message": "Akses ditolak. Sesi Anda tidak valid atau telah berakhir.",
                  "data": null
                }
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Login user ke dalam sistem.
      security: []
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "shiro@gmail.com",
                "password": "shiro123"
              }
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
                example: refresh_token=xxxxxxx; HttpOnly; Secure
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                  status:
                    type: boolean
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Login berhasil",
                  "data": {
                    "access_token": "v2.xxxxxxx"
                  }
                }
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  error:
                    type: string
                  status:
                    type: boolean
              example: |
                {
                  "status": false,
                  "code": 400,
                  "message": "Validasi gagal. Silakan periksa kembali input Anda.",
                  "data": {
                    "nama_parameter": ["Pesan error spesifik dari backend (bahasa indonesia)"]
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  code:
                    type: integer
                  message:
                    type: string
                  data: null
              example: |
                {
                  "status": false,
                  "code": 401,
                  "message": "Email atau password yang Anda masukkan salah.",
                  "data": null
                }
