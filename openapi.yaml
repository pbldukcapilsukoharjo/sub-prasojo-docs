  /api/v1/dashboard/harian:
    get:
      tags:
        - Dashboard
      summary: Harian
      description: Mendapatkan jumlah ajuan dalam rentang waktu tertentu.
      parameters:
        - name: tanggal_awal
          in: query
          schema:
            type: string
            default: "2026-03-25"
        - name: tanggal_akhir
          in: query
          schema:
            type: string
            default: "2026-03-27"
      responses:
        '200':
          description: Success
          content:
            application/json:
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Berhasil mendapatkan jumlah ajuan dalam harian",
                  "data": [
                    { "tanggal": "2026-03-25", "jumlah": 18 },
                    { "tanggal": "2026-03-26", "jumlah": 22 },
                    { "tanggal": "2026-03-27", "jumlah": 15 }
                  ]
                }

