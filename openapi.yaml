openapi: 3.0.3
info:
  title: Sub-Prasojo API
  version: 1.1.2
  description: API Design untuk Dashboard Kinerja dan TAMAT
servers:
  - url: "http://localhost:8000"
    description: Local Server
  - url: "https://6ifb537y9e5l.mock.hoppscotch.io"
    description: Mock Server

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register
      description: Mendaftarkan operator baru ke dalam sistem.
      requestBody:
        content:
          application/json:
            example: |
              {
                "fullname": "",
                "email": "",
                "password": ""
              }
      responses:
        "200":
          description: Success
          content:
            application/json:
              example: |
                {
                  "message": "Operator registered successfully",
                }

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Login operator ke dalam sistem.
      requestBody:
        content:
          application/json:
            example: |
              {
                "email": "",
                "password": ""
              }
      responses:
        "200":
          description: Success
          content:
            application/json:
              example: |
                {
                  "message": "Login successful",
                  "data": {
                    "token": ""
                  }
                }

