  /api/v1/wilayah/distribusi:
    get:
      tags:
        - Wilayah
      summary: List Distribusi Wilayah
      description: >-
        Mendapatkan semua distribusi wilayah


        **Catatan:** Jika filter `kecamatan_code` (atau id_kecamatan)
        diterapkan, maka data yang ditampilkan adalah distribusi pada tingkat
        desa/kelurahan di kecamatan tersebut.
      parameters:
        - name: page
          required: false
          in: query
          schema:
            type: integer
            default: 1
          description: Nomor halaman.
        - name: search
          in: query
          schema:
            type: string
          description: Pencarian berdasarkan nama kecamatan atau nama desa.
        - name: id_kecamatan
          in: query
          description: >-
            Filter data berdasarkan ID kecamatan. Jika filter kecamatan
            diterapkan, maka akan menampilkan data desa/kelurahan.
          schema:
            type: integer
        - name: sort_by
          in: query
          schema:
            type: string
            default: newest
          description: 'Urutan data (contoh: newest, oldest).'
        - name: periode_bulan
          in: query
          schema:
            type: integer
          description: Memfilter data berdasarkan bulan tertentu (1-12).
        - name: start_date
          in: query
          schema:
            type: string
          description: >-
            Memfilter data berdasarkan rentang tanggal spesifik (Format tanggal
            harus: dd-mm-yyyy).
        - name: end_date
          in: query
          schema:
            type: string
          description: >-
            Memfilter data berdasarkan rentang tanggal spesifik (Format tanggal
            harus: dd-mm-yyyy).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      total_kecamatan:
                        type: integer
                      total_ajuan_dokumen:
                        type: integer
                      rata_rata_ajuan:
                        type: integer
                      daftar_ajuan:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                desa:
                                  type: string
                                kecamatan:
                                  type: string
                                total_ajuan:
                                  type: integer
                                ktp-el:
                                  type: integer
                                kia:
                                  type: integer
                                akta_kelahiran:
                                  type: integer
                                akta_kematian:
                                  type: integer
                                perpindahan:
                                  type: integer
                                kedatangan:
                                  type: integer
                                update_data:
                                  type: integer
                                rekam_jemput_bola:
                                  type: integer
                          meta:
                            type: object
                            properties:
                              page:
                                type: integer
                              per_page:
                                type: integer
                              total:
                                type: integer
                              total_page:
                                type: integer
                  status:
                    type: boolean
              example: |
                {
                  "status": true,
                  "code": 200,
                  "message": "Distribusi wilayah berhasil ditemukan",
                  "data": {
                    "total_kecamatan": 14,
                    "total_ajuan_dokumen": 267,
                    "rata_rata_ajuan": 200,
                    "daftar_ajuan": {
                      "list": [
                        {
                          "id": 1,
